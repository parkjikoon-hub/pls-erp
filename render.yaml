# Render 배포 설정 — PLS ERP 백엔드 (FastAPI)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: pls-erp-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # Render 대시보드에서 직접 입력
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false  # Vercel 배포 후 URL 입력
      - key: DEBUG
        value: "false"
      - key: PYTHONPATH
        value: "."
